      <p>Artificial intelligence is transforming healthcare in ways that were once confined to the realm of science fiction. From diagnostic algorithms that can detect cancer in medical images with greater accuracy than human radiologists, to predictive models that anticipate patient deterioration hours before it occurs, AI systems are increasingly being deployed across clinical settings.</p>
      <p>The most promising applications lie not in replacing physicians, but in augmenting their capabilities. A study published in Nature Medicine in 2024 found that AI-assisted diagnoses were 23% more accurate than those made by doctors working alone, and 18% more accurate than AI systems operating independently. This synergy — where human judgment and machine precision combine — represents the true potential of medical AI.</p>
      <p>However, significant barriers remain. The "black box" problem — where AI systems reach conclusions without being able to explain their reasoning — poses particular challenges in medicine, where clinical decisions require justification. Regulators in both the United States and the European Union have begun drafting frameworks that would require AI diagnostic tools to provide interpretable explanations for their outputs.</p>
      <p>Data privacy presents another obstacle. Training effective medical AI requires vast datasets of patient records, yet healthcare data is among the most sensitive information. Federated learning — a technique where AI models are trained across multiple decentralized servers holding local data samples without exchanging them — has emerged as a potential solution, allowing hospitals to collaborate without compromising patient confidentiality.</p>
      <p>Perhaps the most overlooked challenge is algorithmic bias. Several high-profile investigations have revealed that AI diagnostic tools perform significantly worse for minority populations, primarily because they were trained on datasets that underrepresent these groups. Addressing this will require not just technical fixes, but a fundamental rethinking of how medical data is collected and curated.</p>

      <p>In 1989, sociologist Ray Oldenburg coined the term "third place" to describe social surroundings separate from the two usual social environments of home ("first place") and the workplace ("second place"). These were places like cafes, barbershops, bookstores, pubs, and community centers — locations where people could gather informally, where conversation was the main activity, and where social leveling occurred regardless of status or class.</p>
      <p>Three decades later, third places are in steep decline. The rise of e-commerce has shuttered independent bookstores and record shops. Streaming services have emptied movie theaters. Food delivery apps mean fewer people eat in restaurants. Even coffee shops — perhaps the most resilient third place — have increasingly become spaces where individuals sit alone with laptops, headphones on, functionally alone together.</p>
      <p>The consequences of this decline extend far beyond nostalgia. Research from the Harvard Study of Adult Development, which has tracked participants for over 80 years, consistently identifies social connection as the single strongest predictor of happiness and longevity. A 2023 meta-analysis published in BMC Public Health found that individuals with strong social ties had a 50% higher likelihood of survival over the study periods compared to those with weaker connections — an effect comparable to quitting smoking.</p>
      <p>What makes third places uniquely valuable is their informality. Unlike scheduled social activities — dinner parties, team sports, book clubs — third places require no planning, no invitations, and no obligation. You simply show up. This low barrier to entry makes them especially important for those who might otherwise struggle to maintain social connections: the elderly, newcomers to a city, remote workers, and people living alone.</p>
      <p>Efforts to revive third places have met with mixed success. Some cities have invested in public plazas, community gardens, and pedestrian-friendly streets. Private initiatives, like the "Third Place Project" in Portland, Oregon, offer grants to small businesses that agree to host free community events. But experts argue that the deeper challenge is cultural: in an era of personalized entertainment, on-demand delivery, and digital communication, the simple act of showing up somewhere with no purpose other than being around others has come to feel almost radical.</p>

      <p>In 2011, researchers at Ben-Gurion University analyzed over 1,100 parole decisions made by Israeli judges and discovered a striking pattern: prisoners who appeared early in the morning were granted parole about 65% of the time, while those who appeared late in the day were paroled at a rate near zero. The deciding factor, the researchers concluded, was not the severity of the crime or the prisoner's behavior, but the judges' mental fatigue.</p>
      <p>This phenomenon, known as decision fatigue, describes the deteriorating quality of decisions made by an individual after a long session of decision-making. Each choice we make — from what to eat for breakfast to whether to approve a budget — depletes a finite cognitive resource. As this resource is exhausted, we begin to either make poor decisions or avoid making decisions altogether, defaulting to the path of least resistance.</p>
      <p>The implications extend far beyond the courtroom. A study of consumer behavior found that shoppers who had already made numerous purchasing decisions performed worse on math tests and were more likely to choose sugary snacks over healthy alternatives. Similarly, executives who schedule important meetings for late afternoon may be unknowingly compromising their judgment on critical business decisions.</p>
      <p>Not all decisions are equally draining. Research distinguishes between "deliberative" decisions, which require careful weighing of trade-offs, and "implemental" decisions, which simply involve executing a previously made choice. It's the former — the decisions that force us to compare options and anticipate consequences — that exact the heaviest cognitive toll.</p>
      <p>Strategies for managing decision fatigue range from the individual to the institutional. On a personal level, establishing routines for low-stakes decisions (what to wear, what to eat) preserves cognitive resources for higher-stakes choices. Some organizations have restructured workflows so that critical decisions are made in the morning when mental energy is highest. Perhaps most effectively, leaders can reduce the total number of decisions they make by delegating, automating, or simply eliminating unnecessary choices — a practice Steve Jobs famously adopted by wearing the same outfit every day.</p>

      <p>In 1995, eight wolves were released into Yellowstone National Park after a 70-year absence. What happened next surprised even the ecologists who had lobbied for the reintroduction. The wolves not only controlled the elk population — which had been overgrazing the park's vegetation — but triggered a cascade of ecological changes that transformed the entire landscape. Riverbank trees regenerated, stabilizing eroding streams. Beavers returned, building dams that created wetland habitats. Bird species that had not been seen in decades reappeared.</p>
      <p>This dramatic recovery exemplifies the philosophy of rewilding: the large-scale restoration of ecosystems to the point where nature can take care of itself. Unlike traditional conservation, which often focuses on preserving specific species or habitats in their current state, rewilding aims to restore natural processes — predation, migration, flooding, fire — and then step back.</p>
      <p>Europe has emerged as an unexpected leader in rewilding. Since 2000, the continent has gained an area of wild land larger than Portugal, much of it on abandoned farmland. In Romania's Carpathian Mountains, the largest population of European bison — a species that nearly went extinct in the 1920s — now roams freely. In Croatia, the removal of dams along the Mrežnica River has revived fish populations and attracted tourists to what was a declining rural region.</p>

          "A. a practical and widely supported rewilding initiative",
          "B. a controversial idea that pushes rewilding philosophy to its extreme",
          "C. a successful case study in Pleistocene rewilding",
          "D. the type of project most ecologists enthusiastically endorse"
        ],
        answer: 1
      }
    ]
  }
];

// ==================== STATE ====================
let currentPassageIdx = 0;
let timers = passages.map(() => ({ seconds: 0, running: false, interval: null }));
let submitted = passages.map(() => false);
let userAnswers = passages.map(() => ({}));

// ==================== RENDER ====================
const passageTabs = document.getElementById('passageTabs');
const passageArea = document.getElementById('passageArea');
const questionsArea = document.getElementById('questionsArea');
const timerEl = document.getElementById('timer');
const submitBtn = document.getElementById('submitBtn');
const scoreSummary = document.getElementById('scoreSummary');
const actionArea = document.getElementById('actionArea');

function renderTabs() {
  passageTabs.innerHTML = passages.map((p, i) => {
    let cls = 'passage-tab';
    if (i === currentPassageIdx) cls += ' active';
    if (submitted[i]) cls += ' done';
    return `<button class="${cls}" data-idx="${i}">${submitted[i] ? '✓ ' : ''}文章 ${i + 1}</button>`;
  }).join('');
}

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function renderPassage() {
  const p = passages[currentPassageIdx];
  passageArea.innerHTML = `
    <div class="card">
      <h2>${p.title}</h2>
      <div class="passage-text">${p.text.trim()}</div>
      <p style="margin-top:12px; color:var(--text-secondary); font-size:13px;">${p.source}</p>
    </div>
  `;
}

function renderQuestions() {
  const p = passages[currentPassageIdx];
  const saved = userAnswers[currentPassageIdx];
  const done = submitted[currentPassageIdx];

  if (done) {
    // Show questions with correct/incorrect highlighting
    questionsArea.innerHTML = `
      <div class="questions-title">📝 题目（共 ${p.questions.length} 题）</div>
      ${p.questions.map((q, qi) => {
        const userAns = saved[q.id];
        const correct = p.questions[qi].answer;
        const isCorrect = userAns === correct;
        return `
          <div class="question">
            <div class="q-header">
              <span class="q-num">${qi + 1}</span>
              ${q.stem}
              <span class="q-result ${isCorrect ? 'correct' : 'wrong'}">${isCorrect ? '✓ 正确' : '✗ 错误'}</span>
            </div>
            <ul class="options disabled-radio">
              ${q.options.map((opt, oi) => {
                let cls = '';
                if (oi === correct) cls = 'correct-answer';
                if (oi === userAns && !isCorrect) cls = 'user-wrong';
                return `
                  <li>
                    <label class="${cls}">
                      <input type="radio" disabled ${oi === userAns ? 'checked' : ''}>
                      <span>${opt}</span>
                      ${oi === correct ? '<span style="margin-left:auto;font-weight:700;font-size:12px;color:var(--correct)">← 正确答案</span>' : ''}
                    </label>
                  </li>`;
              }).join('')}
            </ul>
          </div>`;
      }).join('')}
    `;
    submitBtn.textContent = '重新作答';
    submitBtn.style.display = 'inline-block';
  } else {
    questionsArea.innerHTML = `
      <div class="questions-title">📝 题目（共 ${p.questions.length} 题）</div>
      ${p.questions.map((q, qi) => `
        <div class="question">
          <div class="q-header">
            <span class="q-num">${qi + 1}</span>
            ${q.stem}
          </div>
          <ul class="options">
            ${q.options.map((opt, oi) => `
              <li>
                <label>
                  <input type="radio" name="q${q.id}" value="${oi}" ${saved[q.id] === oi ? 'checked' : ''} data-qid="${q.id}" data-oidx="${oi}">
                  <span>${opt}</span>
                </label>
              </li>`).join('')}
          </ul>
        </div>
      `).join('')}
    `;
    submitBtn.textContent = '提交答案';
    submitBtn.style.display = 'inline-block';

    // Attach event listeners to radio buttons
    questionsArea.querySelectorAll('input[type="radio"]').forEach(radio => {
      radio.addEventListener('change', function() {
        const qid = parseInt(this.dataset.qid);
        const oidx = parseInt(this.dataset.oidx);
        userAnswers[currentPassageIdx][qid] = oidx;
      });
    });
  }
}

function updateTimerDisplay() {
  const s = timers[currentPassageIdx].seconds;
  timerEl.textContent = formatTime(s);
  timerEl.className = 'time';
  if (s > 900) timerEl.classList.add('danger');      // > 15 min
  else if (s > 600) timerEl.classList.add('warning'); // > 10 min
}

function renderScore() {
  if (!submitted[currentPassageIdx]) {
    scoreSummary.classList.remove('show');
    return;
  }
  const p = passages[currentPassageIdx];
  const saved = userAnswers[currentPassageIdx];
  let correct = 0;
  p.questions.forEach(q => {
    if (saved[q.id] === q.answer) correct++;
  });
  const total = p.questions.length;
  const pct = Math.round((correct / total) * 100);

  scoreSummary.classList.add('show');
  const big = document.getElementById('bigScore');
  big.textContent = correct + '/' + total;
  big.className = 'big-score ' + (pct >= 80 ? 'good' : pct >= 60 ? 'ok' : 'bad');
  document.getElementById('accuracy').textContent = pct + '%';
  document.getElementById('timeUsed').textContent = formatTime(timers[currentPassageIdx].seconds);
}

function renderAll() {
  renderTabs();
  renderPassage();
  renderQuestions();
  updateTimerDisplay();
  renderScore();
}

// ==================== TIMER ====================
function startTimer(idx) {
  if (timers[idx].running) return;
  timers[idx].running = true;
  timers[idx].interval = setInterval(() => {
    timers[idx].seconds++;
    if (idx === currentPassageIdx) updateTimerDisplay();
  }, 1000);
}

function stopTimer(idx) {
  timers[idx].running = false;
  if (timers[idx].interval) {
    clearInterval(timers[idx].interval);
    timers[idx].interval = null;
  }
}

function resetTimer() {
  stopTimer(currentPassageIdx);
  timers[currentPassageIdx].seconds = 0;
  updateTimerDisplay();
  if (!submitted[currentPassageIdx]) startTimer(currentPassageIdx);
}

// ==================== ACTIONS ====================
function switchPassage(idx) {
  if (idx === currentPassageIdx) return;
  stopTimer(currentPassageIdx);
  currentPassageIdx = idx;
  if (!submitted[currentPassageIdx]) startTimer(currentPassageIdx);
  renderAll();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function submitPassage() {
  const p = passages[currentPassageIdx];
  if (submitted[currentPassageIdx]) {
    // Re-do: clear submission
    submitted[currentPassageIdx] = false;
    userAnswers[currentPassageIdx] = {};
    timers[currentPassageIdx].seconds = 0;
    renderAll();
    startTimer(currentPassageIdx);
    return;
  }

  // Check all questions answered
  const saved = userAnswers[currentPassageIdx];
  const unanswered = p.questions.filter(q => saved[q.id] === undefined);
  if (unanswered.length > 0) {
    alert(`还有 ${unanswered.length} 道题未作答，请完成所有题目后再提交。`);
    return;
  }

  submitted[currentPassageIdx] = true;
  stopTimer(currentPassageIdx);
  renderAll();
  window.scrollTo({ top: 0, behavior: 'smooth' });

  // Update memory: save progress
  saveProgress();
}

// ==================== PERSISTENCE ====================
function saveProgress() {
  const data = {
    submitted,
    userAnswers,
    timers: timers.map(t => ({ seconds: t.seconds })),
    currentPassageIdx
  };
  localStorage.setItem('cet6-reading-progress', JSON.stringify(data));
}

function loadProgress() {
  try {
    const raw = localStorage.getItem('cet6-reading-progress');
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.submitted) submitted = data.submitted;
    if (data.userAnswers) userAnswers = data.userAnswers;
    if (data.timers) data.timers.forEach((t, i) => { if (timers[i]) timers[i].seconds = t.seconds || 0; });
    if (data.currentPassageIdx !== undefined) currentPassageIdx = data.currentPassageIdx;
  } catch (e) { /* ignore corrupt data */ }
}

// ==================== EVENTS ====================
passageTabs.addEventListener('click', function(e) {
  const tab = e.target.closest('.passage-tab');
  if (!tab) return;
  const idx = parseInt(tab.dataset.idx);
  switchPassage(idx);
});

submitBtn.addEventListener('click', submitPassage);
document.getElementById('resetTimerBtn').addEventListener('click', resetTimer);

// Keyboard shortcuts
document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.key === 'Enter') {
    e.preventDefault();
    submitPassage();
  }
});

// ==================== VOCABULARY INTEGRATION ====================
const VOCAB_KEY = 'cet6_vocabulary';
let vocabStore = {};

function loadVocabStore() {
  try {
    vocabStore = JSON.parse(localStorage.getItem(VOCAB_KEY)) || {};
  } catch (e) { vocabStore = {}; }
}

function saveVocabStore() {
  localStorage.setItem(VOCAB_KEY, JSON.stringify(vocabStore));
}

function addVocabWord(word, article) {
  const key = word.toLowerCase();
  if (vocabStore[key]) {
    showToast(`"${word}" 已在生词本中`);
    return false;
  }
  vocabStore[key] = {
    word: word,
    note: '',
    article: article || '阅读',
    addedAt: new Date().toISOString()
  };
  saveVocabStore();
  highlightVocabInPassage();
  updateVocabBadge();
  showToast(`已添加 "${word}" → 生词本`);
  return true;
}

function removeVocabWord(word) {
  const key = word.toLowerCase();
  if (vocabStore[key]) {
    delete vocabStore[key];
    saveVocabStore();
    renderPassage();  // re-render to remove highlights
    renderQuestions();
    if (submitted[currentPassageIdx]) {
      // Keep showing results
    }
    updateVocabBadge();
    showToast(`已移除 "${word}"`);
  }
}

function updateVocabBadge() {
  const count = Object.keys(vocabStore).length;
  const badge = document.getElementById('headerVocabCount');
  if (badge) badge.textContent = count + ' 词';
}

// ── Right-click word detection (same logic as vocabulary page) ──
function getWordAtPoint(e) {
  let range;
  if (document.caretPositionFromPoint) {
    const pos = document.caretPositionFromPoint(e.clientX, e.clientY);
    if (pos && pos.offsetNode && pos.offsetNode.nodeType === Node.TEXT_NODE) {
      range = document.createRange();
      range.setStart(pos.offsetNode, pos.offset);
      range.setEnd(pos.offsetNode, pos.offset);
    }
  } else if (document.caretRangeFromPoint) {
    range = document.caretRangeFromPoint(e.clientX, e.clientY);
  }
  if (!range) return '';
  const textNode = range.startContainer;
  const offset = range.startOffset;
  const text = textNode.textContent;
  if (!text) return '';
  let start = offset, end = offset;
  while (start > 0 && /\w/.test(text[start - 1])) start--;
  while (end < text.length && /\w/.test(text[end])) end++;
  const word = text.slice(start, end).trim();
  if (word.length < 2 || word.length > 40) return '';
  if (!/[a-zA-Z]/.test(word)) return '';
  return word;
}

// ── Context Menu ──
let contextWord = '';
const ctxMenu = document.getElementById('contextMenu');

document.addEventListener('contextmenu', function(e) {
  const passageEl = e.target.closest('.passage-text');
  if (!passageEl) { ctxMenu.style.display = 'none'; return; }
  const word = getWordAtPoint(e);
  if (!word) { ctxMenu.style.display = 'none'; return; }
  e.preventDefault();
  contextWord = word;

  // Update menu item text based on whether word is already in vocab
  const addItem = document.getElementById('menuAddWord');
  if (vocabStore[word.toLowerCase()]) {
    addItem.textContent = '✕ 从生词本移除';
  } else {
    addItem.textContent = '➕ 添加到生词本';
  }

  ctxMenu.style.display = 'block';
  ctxMenu.style.left = e.clientX + 'px';
  ctxMenu.style.top = e.clientY + 'px';
  const rect = ctxMenu.getBoundingClientRect();
  if (rect.right > window.innerWidth) ctxMenu.style.left = (e.clientX - rect.width) + 'px';
  if (rect.bottom > window.innerHeight) ctxMenu.style.top = (e.clientY - rect.height) + 'px';
});

document.addEventListener('click', function(e) {
  if (!ctxMenu.contains(e.target)) ctxMenu.style.display = 'none';
});

document.getElementById('menuAddWord').addEventListener('click', function() {
  ctxMenu.style.display = 'none';
  if (vocabStore[contextWord.toLowerCase()]) {
    removeVocabWord(contextWord);
  } else {
    const p = passages[currentPassageIdx];
    addVocabWord(contextWord, '阅读P' + (currentPassageIdx + 1));
  }
});

document.getElementById('menuLookup').addEventListener('click', function() {
  ctxMenu.style.display = 'none';
  window.open('https://cn.bing.com/dict/search?q=' + encodeURIComponent(contextWord), '_blank');
});

// ── Highlight vocab words in current passage ──
function highlightVocabInPassage() {
  const words = Object.keys(vocabStore);
  if (words.length === 0) return;

  const passageText = document.querySelector('.passage-text');
  if (!passageText) return;

  // Walk text nodes and wrap vocab words in spans
  const walker = document.createTreeWalker(passageText, NodeFilter.SHOW_TEXT, null, false);
  const textNodes = [];
  while (walker.nextNode()) textNodes.push(walker.currentNode);

  // Sort by length descending so longer words match first
  const sorted = words.slice().sort((a, b) => b.length - a.length);
  const escaped = sorted.map(w => w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  const regex = new RegExp('\\b(' + escaped.join('|') + ')\\b', 'gi');

  textNodes.forEach(node => {
    // Skip nodes inside our own vocab-marked spans (check parent)
    if (node.parentNode.classList && node.parentNode.classList.contains('vocab-marked')) return;

    const text = node.textContent;
    regex.lastIndex = 0;
    if (!regex.test(text)) return;

    regex.lastIndex = 0;
    const fragment = document.createDocumentFragment();
    let lastIndex = 0, match;
    while ((match = regex.exec(text)) !== null) {
      if (match.index > lastIndex) {
        fragment.appendChild(document.createTextNode(text.slice(lastIndex, match.index)));
      }
      const span = document.createElement('span');
      span.className = 'vocab-marked';
      span.textContent = match[0];
      const note = vocabStore[match[0].toLowerCase()]?.note;
      span.title = note || '已收藏到生词本';
      span.dataset.word = match[0];
      fragment.appendChild(span);
      lastIndex = regex.lastIndex;
    }
    if (lastIndex < text.length) {
      fragment.appendChild(document.createTextNode(text.slice(lastIndex)));
    }
    node.parentNode.replaceChild(fragment, node);
  });
}

// ── Toast ──
let toastTimer = null;
function showToast(msg) {
  const toast = document.getElementById('toast');
  if (!toast) return;
  if (toastTimer) clearTimeout(toastTimer);
  toast.textContent = msg;
  toast.classList.add('show');
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}

// ── Patch renderPassage to auto-highlight vocab words ──
const origRenderPassage = renderPassage;
renderPassage = function() {
  origRenderPassage();
  highlightVocabInPassage();
};

// ==================== INIT ====================
loadVocabStore();
loadProgress();
updateVocabBadge();
startTimer(currentPassageIdx);
renderAll();
</script>
