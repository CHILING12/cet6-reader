      <p>"The dangerous thing about lying is people don't understand how the act changes us," says Dan Ariely, behavioral psychologist at Duke University. Psychologists have documented children lying as early as the age of two. Some experts even consider lying a developmental milestone, like crawling and walking, because it requires sophisticated planning, attention and the ability to see a situation from someone else's perspective to manipulate them. But, for most people, lying gets limited as we develop a sense of morality and the ability to self-regulate.</p>
      <p>Harvard cognitive neuroscientist Joshua Greene says, for most of us, lying takes work. In studies, he gave study subjects a chance to deceive for monetary gain while examining their brains in a functional MRI machine, which maps blood flow to active parts of the brain. Some people told the truth instantly and instinctively. But others opted to lie, and they showed increased activity in their frontal parietal control network, which is involved in difficult or complex thinking. This suggests that they were deciding between truth and dishonesty — and ultimately opting for the latter. For a follow-up analysis, he found that people whose neural reward centers were more active when they won money were also more likely to be among the group of liars — suggesting that lying may have to do with the inability to resist temptation.</p>
      <p>External conditions also matter in terms of when and how often we lie. We are more likely to lie, research shows, when we are able to rationalize it, when we are stressed and fatigued or see others being dishonest. And we are less likely to lie when we have moral reminders or when we think others are watching. "We as a society need to understand that, when we don't punish lying, we increase the probability it will happen again," Ariely says.</p>
      <p>In a 2016 study published in the journal Nature Neuroscience, Ariely and colleagues showed how dishonesty alters people's brains, making it easier to tell lies in the future. When people uttered a falsehood, the scientists noticed a burst of activity in their amygdala. The amygdala is a crucial part of the brain that produces fear, anxiety and emotional responses including that sinking, guilty feeling you get when you lie. But when scientists had their subjects play a game — in which they won money by deceiving their partner — they noticed the negative signals from the amygdala began to decrease. Not only that, but when people faced no consequences for dishonesty, their falsehoods tended to get even more sensational. This means that if you give people multiple opportunities to lie for their own benefit, they start with little lies which get bigger over time.</p>

      <p>It is not controversial to say that an unhealthy diet causes bad health. Nor are the basic elements of healthy eating disputed. Obesity raises susceptibility to cancer, and Britain is the sixth most obese country on Earth. That is a public health emergency. But naming the problem is the easy part. No one disputes the costs in quality of life and depleted health budgets of an obese population, but the quest for solutions gets diverted by ideological arguments around responsibility and choice. And the water is muddied by lobbying from the industries that profit from consumption of obesity-inducing products.</p>

      <p>Many members of parliament are uncomfortable even with their own government's anti-obesity strategy, since it involves a "sugar tax" and a ban on the sale of energy drinks to under-16s. Bans and taxes can be blunt instruments, but their harshest critics can rarely suggest better methods. These critics just oppose regulation itself.</p>

      <p>Rising temperatures and overfishing in the pristine waters around the Antarctic could see King penguin populations pushed to the brink of extinction by the end of the century, according to a new study. The study's report states that as global warming transforms the environment in the world's last great wilderness, 70 percent of king penguins could either disappear or be forced to find new breeding grounds.</p>
      <p>Co-author Céline Le Bohec, from the University of Strasbourg in France, warned: "If there're no actions aimed at halting or controlling global warming, and the pace of the current human-induced changes such as climate change and overfishing stays the same, the species may soon disappear." The findings come amid growing concern over the future of the Antarctic. Earlier this month a separate study found that a combination of climate change and industrial fishing is threatening the krill population in Antarctic waters, with a potentially disastrous impact on whales, seals and penguins. But today's report is the starkest warning yet of the potentially devastating impact of climate change and human exploitation on the Antarctic's delicate ecosystems. Le Bohec said: "Unless current greenhouse gas emissions drop, 70 percent of king penguins — 1.1 million breeding pairs — will be forced to relocate their breeding grounds, or face extinction by 2100."</p>

    text: `
      <p>Humans are fascinated by the source of their failings and virtues. This preoccupation inevitably leads to an old debate: whether nature or nurture moulds us more. A revolution in genetics has poised this as a modern political question about the character of our society: if personalities are hard-wired into our genes, what can governments do to help us? It feels morally questionable, yet claims of genetic selection by intelligence are making headlines.</p>
      <p>This is down to "hereditarian" (遗传论的) science and a recent paper claimed "differences in exam performance between pupils attending selective and non-selective schools mirror the genetic differences between them". With such an assertion, the work was predictably greeted by a lot of absurd claims about "genetics determining academic success". What the research revealed was the rather less surprising result: the educational benefits of selective schools largely disappear once pupils' inborn ability and socio-economic background were taken into account. It is a glimpse of the blindingly obvious — and there's nothing to back strongly either a hereditary or environmental argument.</p>
      <p>Yet the paper does say children are "unintentionally genetically selected" by the school system. Central to hereditarian science is a tall claim: that identifiable variations in genetic sequences can predict an individual's aptness to learn, reason and solve problems. This is problematic on many levels. A teacher could not seriously tell a parent their child has a low genetic tendency to study when external factors clearly exist. Unlike-minded academics say the inheritability of human traits is scientifically unsound. At best there is a weak statistical association and not a causal link between DNA and intelligence. Yet sophisticated statistics are used to create an intimidatory atmosphere of scientific certainty.</p>
      <p>While there's an undoubted genetic basis to individual difference, it is wrong to think that socially defined groups can be genetically accounted for. The fixation on genes as destiny is surely false too. Medical predictability can rarely be based on DNA alone; the environment matters too. Something as complex as intellect is likely to be affected by many factors beyond genes. If hereditarians want to advance their cause it will require more balanced interpretation and not just acts of advocacy.</p>
      <p>Genetic selection is a way of exerting influence over others, "the ultimate collective control of human destinies," as writer H. G. Wells put it. Knowledge becomes power and power requires a sense of responsibility. In understanding cognitive ability, we must not elevate discrimination to a science: allowing people to climb the ladder of life only as far as their cells might suggest. This will need a more sceptical eye on the science. As technology progresses, we all have a duty to make sure that we shape a future that we would want to find ourselves in.</p>

// ==================== STATE ====================
let currentPassageIdx = 0;
let timers = passages.map(() => ({ seconds: 0, running: false, interval: null }));
let submitted = passages.map(() => false);
let userAnswers = passages.map(() => ({}));

// ==================== RENDER ====================
const passageTabs = document.getElementById('passageTabs');
const passageArea = document.getElementById('passageArea');
const questionsArea = document.getElementById('questionsArea');
const timerEl = document.getElementById('timer');
const submitBtn = document.getElementById('submitBtn');
const scoreSummary = document.getElementById('scoreSummary');
const actionArea = document.getElementById('actionArea');

function renderTabs() {
  passageTabs.innerHTML = passages.map((p, i) => {
    let cls = 'passage-tab';
    if (i === currentPassageIdx) cls += ' active';
    if (submitted[i]) cls += ' done';
    return `<button class="${cls}" data-idx="${i}">${submitted[i] ? '✓ ' : ''}真题 ${i + 1}</button>`;
  }).join('');
}

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function renderPassage() {
  const p = passages[currentPassageIdx];
  passageArea.innerHTML = `
    <div class="card">
      <h2>${p.title}</h2>
      <div class="passage-text">${p.text.trim()}</div>
      <p style="margin-top:12px; color:var(--text-secondary); font-size:13px;">📋 ${p.source}</p>
    </div>
  `;
}

function renderQuestions() {
  const p = passages[currentPassageIdx];
  const saved = userAnswers[currentPassageIdx];
  const done = submitted[currentPassageIdx];

  if (done) {
    questionsArea.innerHTML = `
      <div class="questions-title">📝 题目（共 ${p.questions.length} 题）</div>
      ${p.questions.map((q, qi) => {
        const userAns = saved[q.id];
        const correct = p.questions[qi].answer;
        const isCorrect = userAns === correct;
        return `
          <div class="question">
            <div class="q-header">
              <span class="q-num">${qi + 1}</span>
              ${q.stem}
              <span class="q-result ${isCorrect ? 'correct' : 'wrong'}">${isCorrect ? '✓ 正确' : '✗ 错误'}</span>
            </div>
            <ul class="options disabled-radio">
              ${q.options.map((opt, oi) => {
                let cls = '';
                if (oi === correct) cls = 'correct-answer';
                if (oi === userAns && !isCorrect) cls = 'user-wrong';
                return `
                  <li>
                    <label class="${cls}">
                      <input type="radio" disabled ${oi === userAns ? 'checked' : ''}>
                      <span>${opt}</span>
                      ${oi === correct ? '<span style="margin-left:auto;font-weight:700;font-size:12px;color:var(--correct)">← 正确答案</span>' : ''}
                    </label>
                  </li>`;
              }).join('')}
            </ul>
          </div>`;
      }).join('')}
    `;
    submitBtn.textContent = '重新作答';
    submitBtn.style.display = 'inline-block';
  } else {
    questionsArea.innerHTML = `
      <div class="questions-title">📝 题目（共 ${p.questions.length} 题）</div>
      ${p.questions.map((q, qi) => `
        <div class="question">
          <div class="q-header">
            <span class="q-num">${qi + 1}</span>
            ${q.stem}
          </div>
          <ul class="options">
            ${q.options.map((opt, oi) => `
              <li>
                <label>
                  <input type="radio" name="q${q.id}" value="${oi}" ${saved[q.id] === oi ? 'checked' : ''} data-qid="${q.id}" data-oidx="${oi}">
                  <span>${opt}</span>
                </label>
              </li>`).join('')}
          </ul>
        </div>
      `).join('')}
    `;
    submitBtn.textContent = '提交答案';
    submitBtn.style.display = 'inline-block';

    // Attach event listeners to radio buttons
    questionsArea.querySelectorAll('input[type="radio"]').forEach(radio => {
      radio.addEventListener('change', function() {
        const qid = parseInt(this.dataset.qid);
        const oidx = parseInt(this.dataset.oidx);
        userAnswers[currentPassageIdx][qid] = oidx;
      });
    });
  }
}

function updateTimerDisplay() {
  const s = timers[currentPassageIdx].seconds;
  timerEl.textContent = formatTime(s);
  timerEl.className = 'time';
  if (s > 900) timerEl.classList.add('danger');
  else if (s > 600) timerEl.classList.add('warning');
}

function renderScore() {
  if (!submitted[currentPassageIdx]) {
    scoreSummary.classList.remove('show');
    return;
  }
  const p = passages[currentPassageIdx];
  const saved = userAnswers[currentPassageIdx];
  let correct = 0;
  p.questions.forEach(q => {
    if (saved[q.id] === q.answer) correct++;
  });
  const total = p.questions.length;
  const pct = Math.round((correct / total) * 100);

  scoreSummary.classList.add('show');
  const big = document.getElementById('bigScore');
  big.textContent = correct + '/' + total;
  big.className = 'big-score ' + (pct >= 80 ? 'good' : pct >= 60 ? 'ok' : 'bad');
  document.getElementById('accuracy').textContent = pct + '%';
  document.getElementById('timeUsed').textContent = formatTime(timers[currentPassageIdx].seconds);
}

function renderAll() {
  renderTabs();
  renderPassage();
  renderQuestions();
  updateTimerDisplay();
  renderScore();
}

// ==================== TIMER ====================
function startTimer(idx) {
  if (timers[idx].running) return;
  timers[idx].running = true;
  timers[idx].interval = setInterval(() => {
    timers[idx].seconds++;
    if (idx === currentPassageIdx) updateTimerDisplay();
  }, 1000);
}

function stopTimer(idx) {
  timers[idx].running = false;
  if (timers[idx].interval) {
    clearInterval(timers[idx].interval);
    timers[idx].interval = null;
  }
}

function resetTimer() {
  stopTimer(currentPassageIdx);
  timers[currentPassageIdx].seconds = 0;
  updateTimerDisplay();
  if (!submitted[currentPassageIdx]) startTimer(currentPassageIdx);
}

// ==================== ACTIONS ====================
function switchPassage(idx) {
  if (idx === currentPassageIdx) return;
  stopTimer(currentPassageIdx);
  currentPassageIdx = idx;
  if (!submitted[currentPassageIdx]) startTimer(currentPassageIdx);
  renderAll();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function submitPassage() {
  const p = passages[currentPassageIdx];
  if (submitted[currentPassageIdx]) {
    submitted[currentPassageIdx] = false;
    userAnswers[currentPassageIdx] = {};
    timers[currentPassageIdx].seconds = 0;
    renderAll();
    startTimer(currentPassageIdx);
    return;
  }

  const saved = userAnswers[currentPassageIdx];
  const unanswered = p.questions.filter(q => saved[q.id] === undefined);
  if (unanswered.length > 0) {
    alert(`还有 ${unanswered.length} 道题未作答，请完成所有题目后再提交。`);
    return;
  }

  submitted[currentPassageIdx] = true;
  stopTimer(currentPassageIdx);
  renderAll();
  window.scrollTo({ top: 0, behavior: 'smooth' });
  saveProgress();
}

// ==================== PERSISTENCE ====================
function saveProgress() {
  const data = {
    submitted,
    userAnswers,
    timers: timers.map(t => ({ seconds: t.seconds })),
    currentPassageIdx
  };
  localStorage.setItem('cet6-reading-progress', JSON.stringify(data));
}

function loadProgress() {
  try {
    const raw = localStorage.getItem('cet6-reading-progress');
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.submitted) submitted = data.submitted;
    if (data.userAnswers) userAnswers = data.userAnswers;
    if (data.timers) data.timers.forEach((t, i) => { if (timers[i]) timers[i].seconds = t.seconds || 0; });
    if (data.currentPassageIdx !== undefined) currentPassageIdx = data.currentPassageIdx;
  } catch (e) { /* ignore corrupt data */ }
}

// ==================== EVENTS ====================
passageTabs.addEventListener('click', function(e) {
  const tab = e.target.closest('.passage-tab');
  if (!tab) return;
  const idx = parseInt(tab.dataset.idx);
  switchPassage(idx);
});

submitBtn.addEventListener('click', submitPassage);
document.getElementById('resetTimerBtn').addEventListener('click', resetTimer);

document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.key === 'Enter') {
    e.preventDefault();
    submitPassage();
  }
});

// ==================== VOCABULARY INTEGRATION ====================
const VOCAB_KEY = 'cet6_vocabulary';
let vocabStore = {};

function loadVocabStore() {
  try {
    vocabStore = JSON.parse(localStorage.getItem(VOCAB_KEY)) || {};
  } catch (e) { vocabStore = {}; }
}

function saveVocabStore() {
  localStorage.setItem(VOCAB_KEY, JSON.stringify(vocabStore));
}

function addVocabWord(word, article) {
  const key = word.toLowerCase();
  if (vocabStore[key]) {
    showToast(`"${word}" 已在生词本中`);
    return false;
  }
  vocabStore[key] = {
    word: word,
    note: '',
    article: article || '阅读',
    addedAt: new Date().toISOString()
  };
  saveVocabStore();
  highlightVocabInPassage();
  updateVocabBadge();
  showToast(`已添加 "${word}" → 生词本`);
  return true;
}

function removeVocabWord(word) {
  const key = word.toLowerCase();
  if (vocabStore[key]) {
    delete vocabStore[key];
    saveVocabStore();
    renderPassage();
    renderQuestions();
    if (submitted[currentPassageIdx]) {
      // keep results showing
    }
    updateVocabBadge();
    showToast(`已移除 "${word}"`);
  }
}

function updateVocabBadge() {
  const count = Object.keys(vocabStore).length;
  const badge = document.getElementById('headerVocabCount');
  if (badge) badge.textContent = count + ' 词';
}

function getWordAtPoint(e) {
  let range;
  if (document.caretPositionFromPoint) {
    const pos = document.caretPositionFromPoint(e.clientX, e.clientY);
    if (pos && pos.offsetNode && pos.offsetNode.nodeType === Node.TEXT_NODE) {
      range = document.createRange();
      range.setStart(pos.offsetNode, pos.offset);
      range.setEnd(pos.offsetNode, pos.offset);
    }
  } else if (document.caretRangeFromPoint) {
    range = document.caretRangeFromPoint(e.clientX, e.clientY);
  }
  if (!range) return '';
  const textNode = range.startContainer;
  const offset = range.startOffset;
  const text = textNode.textContent;
  if (!text) return '';
  let start = offset, end = offset;
  while (start > 0 && /\w/.test(text[start - 1])) start--;
  while (end < text.length && /\w/.test(text[end])) end++;
  const word = text.slice(start, end).trim();
  if (word.length < 2 || word.length > 40) return '';
  if (!/[a-zA-Z]/.test(word)) return '';
  return word;
}

let contextWord = '';
const ctxMenu = document.getElementById('contextMenu');

document.addEventListener('contextmenu', function(e) {
  const passageEl = e.target.closest('.passage-text');
  if (!passageEl) { ctxMenu.style.display = 'none'; return; }
  const word = getWordAtPoint(e);
  if (!word) { ctxMenu.style.display = 'none'; return; }
  e.preventDefault();
  contextWord = word;

  const addItem = document.getElementById('menuAddWord');
  if (vocabStore[word.toLowerCase()]) {
    addItem.textContent = '✕ 从生词本移除';
  } else {
    addItem.textContent = '➕ 添加到生词本';
  }

  ctxMenu.style.display = 'block';
  ctxMenu.style.left = e.clientX + 'px';
  ctxMenu.style.top = e.clientY + 'px';
  const rect = ctxMenu.getBoundingClientRect();
  if (rect.right > window.innerWidth) ctxMenu.style.left = (e.clientX - rect.width) + 'px';
  if (rect.bottom > window.innerHeight) ctxMenu.style.top = (e.clientY - rect.height) + 'px';
});

document.addEventListener('click', function(e) {
  if (!ctxMenu.contains(e.target)) ctxMenu.style.display = 'none';
});

document.getElementById('menuAddWord').addEventListener('click', function() {
  ctxMenu.style.display = 'none';
  if (vocabStore[contextWord.toLowerCase()]) {
    removeVocabWord(contextWord);
  } else {
    const p = passages[currentPassageIdx];
    addVocabWord(contextWord, '真题' + (currentPassageIdx + 1));
  }
});

document.getElementById('menuLookup').addEventListener('click', function() {
  ctxMenu.style.display = 'none';
  window.open('https://cn.bing.com/dict/search?q=' + encodeURIComponent(contextWord), '_blank');
});

function highlightVocabInPassage() {
  const words = Object.keys(vocabStore);
  if (words.length === 0) return;

  const passageText = document.querySelector('.passage-text');
  if (!passageText) return;

  const walker = document.createTreeWalker(passageText, NodeFilter.SHOW_TEXT, null, false);
  const textNodes = [];
  while (walker.nextNode()) textNodes.push(walker.currentNode);

  const sorted = words.slice().sort((a, b) => b.length - a.length);
  const escaped = sorted.map(w => w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  const regex = new RegExp('\\b(' + escaped.join('|') + ')\\b', 'gi');

  textNodes.forEach(node => {
    if (node.parentNode.classList && node.parentNode.classList.contains('vocab-marked')) return;

    const text = node.textContent;
    regex.lastIndex = 0;
    if (!regex.test(text)) return;

    regex.lastIndex = 0;
    const fragment = document.createDocumentFragment();
    let lastIndex = 0, match;
    while ((match = regex.exec(text)) !== null) {
      if (match.index > lastIndex) {
        fragment.appendChild(document.createTextNode(text.slice(lastIndex, match.index)));
      }
      const span = document.createElement('span');
      span.className = 'vocab-marked';
      span.textContent = match[0];
      const note = vocabStore[match[0].toLowerCase()]?.note;
      span.title = note || '已收藏到生词本';
      span.dataset.word = match[0];
      fragment.appendChild(span);
      lastIndex = regex.lastIndex;
    }
    if (lastIndex < text.length) {
      fragment.appendChild(document.createTextNode(text.slice(lastIndex)));
    }
    node.parentNode.replaceChild(fragment, node);
  });
}

let toastTimer = null;
function showToast(msg) {
  const toast = document.getElementById('toast');
  if (!toast) return;
  if (toastTimer) clearTimeout(toastTimer);
  toast.textContent = msg;
  toast.classList.add('show');
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}

const origRenderPassage = renderPassage;
renderPassage = function() {
  origRenderPassage();
  highlightVocabInPassage();
};

// ==================== INIT ====================
loadVocabStore();
loadProgress();
updateVocabBadge();
startTimer(currentPassageIdx);
renderAll();
</script>
